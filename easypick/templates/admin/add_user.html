<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>EasyPick - Add User</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b5d4f",
                        "secondary": "#a2b08a",
                        "neutral-bg": "#e8eae6",
                    },
                    fontFamily: { "sans": ["Inter", "sans-serif"] },
                }
            }
        }
    </script>
    <style>
        body { background-color: #e8eae6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="text-slate-900">

    <header class="h-16 bg-white border-b border-secondary/20 flex items-center justify-between px-10 sticky top-0 z-10 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="size-8 bg-secondary rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-primary font-bold">shopping_basket</span>
            </div>
            <h1 class="text-xl font-bold text-primary tracking-tight">EasyPick <span class="text-secondary font-normal ml-2">| Admin</span></h1>
        </div>
        <a href="{% url 'admin_user' %}" class="flex items-center gap-2 text-sm font-medium text-primary/60 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-base">arrow_back</span>
            Back to User Management
        </a>
    </header>

    <main class="py-10 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-primary">Create New User</h2>
                <p class="text-primary/60">Fill in the information below to register a new account in the system.</p>
            </div>

            <form action="" method="POST" enctype="multipart/form-data" class="space-y-8">
                {% csrf_token %}

                <div class="bg-white rounded-2xl shadow-sm border border-secondary/20 overflow-hidden">
                    <div class="bg-primary/5 px-6 py-4 border-b border-secondary/10 flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">lock_person</span>
                        <h3 class="font-bold text-primary">Account Credentials</h3>
                    </div>
                    <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-primary/70 uppercase">Username</label>
                            <input type="text" name="username" required class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5" placeholder="e.g. alex_p">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-primary/70 uppercase">Password</label>
                            <input type="password" name="password" required class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5">
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-secondary/20 overflow-hidden">
                    <div class="bg-primary/5 px-6 py-4 border-b border-secondary/10 flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">person</span>
                        <h3 class="font-bold text-primary">Personal Information</h3>
                    </div>
                    <div class="p-6 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-primary/70 uppercase">First Name</label>
                                <input type="text" name="first_name" class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-primary/70 uppercase">Last Name</label>
                                <input type="text" name="last_name" class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-primary/70 uppercase">Email Address</label>
                                <input type="email" name="email" required class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5" placeholder="alex@example.com">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-primary/70 uppercase">Profile Image</label>
                                <div class="flex items-center gap-3">
                                    <input type="file" name="profile_image" id="profile_image" class="block w-full text-sm text-slate-500
                                        file:mr-4 file:py-2 file:px-4
                                        file:rounded-full file:border-0
                                        file:text-sm file:font-semibold
                                        file:bg-secondary/20 file:text-primary
                                        hover:file:bg-secondary/30 transition-all cursor-pointer">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-secondary/20 overflow-hidden">
                    <div class="bg-primary/5 px-6 py-4 border-b border-secondary/10 flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">admin_panel_settings</span>
                        <h3 class="font-bold text-primary">Role & Permissions</h3>
                    </div>
                    <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-primary/70 uppercase">User Role</label>
                            <select name="role" class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5 bg-white">
                                <option value="CUSTOMER">Customer</option>
                                <option value="SELLER">Seller</option>
                                <option value="ADMIN">System Admin</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-primary/70 uppercase">Phone Number</label>
                            <input type="text" name="phone_number" maxlength="11" class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-primary/70 uppercase">Date of Birth</label>
                            <input type="date" name="dob" class="w-full rounded-xl border-secondary/30 focus:border-primary focus:ring-primary py-2.5">
                        </div>
                        
                        <div class="md:col-span-3 flex flex-wrap gap-6 pt-4 border-t border-neutral-bg">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <div class="relative">
                                    <input type="checkbox" name="is_active" checked class="peer sr-only">
                                    <div class="w-10 h-5 bg-slate-300 rounded-full peer peer-checked:bg-secondary transition-colors"></div>
                                    <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full peer-checked:translate-x-5 transition-transform"></div>
                                </div>
                                <span class="text-sm font-semibold text-primary">Active User</span>
                            </label>

                            <label class="flex items-center gap-3 cursor-pointer group">
                                <div class="relative">
                                    <input type="checkbox" name="is_staff" class="peer sr-only">
                                    <div class="w-10 h-5 bg-slate-300 rounded-full peer peer-checked:bg-primary transition-colors"></div>
                                    <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full peer-checked:translate-x-5 transition-transform"></div>
                                </div>
                                <span class="text-sm font-semibold text-primary">Staff Status</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-end gap-4 pt-6 border-t border-secondary/20">
                    <button type="reset" class="px-6 py-2.5 text-sm font-bold text-primary/60 hover:text-primary transition-colors">
                        Clear Form
                    </button>
                    <button type="submit" class="bg-primary text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-[#3d4c40] hover:-translate-y-0.5 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-xl">save</span>
                        Save User Account
                    </button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
