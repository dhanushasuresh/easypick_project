<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Select Address - EasyPick</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4b5d4f",
                        "accent": "#a2b08a",
                        "neutral-light": "#e8eae6",
                        "background-light": "#f7f7f7",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* Focus styles for the pincode input */
        .pincode-input:focus { border-bottom-color: #4b5d4f !important; outline: none; }
    </style>
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[450px] bg-white rounded-2xl shadow-xl border border-neutral-light overflow-hidden">
        
        <div class="p-6 pb-4">
            <h2 class="text-xl font-bold text-gray-800">Select Delivery Address</h2>
        </div>

        <div class="custom-scrollbar overflow-y-auto max-h-[320px] px-2">
            {% for x in address %}
            <label class="flex items-start gap-4 p-4 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-100 last:border-0 group">
                <div class="relative flex items-center justify-center mt-1">
                    <input type="radio" name="selected_address" value="{{ x.id }}" 
                           class="w-5 h-5 text-primary focus:ring-primary border-gray-300" 
                           {% if forloop.first %}checked{% endif %}>
                </div>
                <div class="flex-1">
                    <div class="flex items-center flex-wrap gap-2">
                        <span class="font-bold text-gray-900">{{ x.full_name }}, {{ x.zip_code }}</span>
                        <span class="bg-gray-100 text-[10px] font-extrabold text-gray-500 px-2 py-0.5 rounded uppercase tracking-wider">
                            {{ x.address_type|default:"HOME" }}
                        </span>
                    </div>
                    <p class="text-sm text-gray-500 mt-1 leading-relaxed line-clamp-2">
                        {{ x.house_no }}, {{ x.street }}, {{ x.landmark }}, {{ x.city }}, {{ x.state }}
                    </p>
                </div>
            </label>
            {% empty %}
            <div class="p-8 text-center text-gray-400">
                <span class="material-symbols-outlined text-4xl mb-2">location_off</span>
                <p>No addresses found.</p>
            </div>
            {% endfor %}
        </div>

        <div class="p-6 pt-8 bg-white border-t border-gray-100">
            <h3 class="text-lg font-bold text-gray-800 mb-6">Use pincode to check delivery info</h3>
            
            <form class="flex gap-4 items-end mb-8">
                <div class="flex-1 border-b-2 border-gray-200 transition-all focus-within:border-primary">
                    <input type="text" placeholder="Enter pincode" 
                           class="w-full border-none focus:ring-0 px-0 py-2 text-gray-700 placeholder:text-gray-400 bg-transparent">
                </div>
                <button type="submit" class="bg-[#94a3b8] hover:bg-primary text-white px-7 py-2 rounded-md font-bold text-sm transition-all shadow-sm">
                    Submit
                </button>
            </form>

            <button type="button" class="flex items-center gap-3 text-blue-600 font-semibold group hover:text-blue-700 transition-colors">
                <div class="flex flex-col items-center">
                    <span class="material-symbols-outlined text-blue-600 group-hover:scale-110 transition-transform">location_on</span>
                    <div class="w-4 h-1 bg-yellow-400 rounded-full blur-[1px] -mt-1 opacity-80"></div>
                </div>
                <span class="text-sm">Use my current location</span>
            </button>
        </div>
    </div>

</body>
</html>
